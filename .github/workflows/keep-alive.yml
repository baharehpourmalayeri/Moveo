name: Keep Render App Alive

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render backend
        run: |
          curl -s https://moveo-backend-qin4.onrender.com/docs > /dev/null
      - name: Ping Render frontend
        run: |
          curl -s https://moveo-frontend-ijeb.onrender.com > /dev/null

<section class="max-w-5xl mx-auto px-6 mt-16">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">Earn Rewards</h2>
  </div>

  <div class="grid grid-rows-1 md:grid-rows-3 gap-6">
    <div *ngFor="let reward of rewards" class="bg-white p-6 rounded-lg shadow text-center">
      <h2 class="text-lg font-semibold mb-2">{{ reward.title }}</h2>
      <p class="text-gray-500 text-sm">{{ reward.description }}</p>
    </div>
  </div>
</section>

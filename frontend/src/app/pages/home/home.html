<div class="min-h-screen">
  <section class="relative">
    <img src="/home/1.jpg" alt="Landing Image" class="w-full h-100 object-cover" />

    <div
      class="absolute inset-0 flex flex-col justify-center items-center text-center bg-black/40 text-white px-6"
    >
      <h1 class="text-4xl font-bold mb-4">Welcome to Moveo</h1>
      <p class="mb-6 max-w-md">Book classes, stay active, and earn rewards</p>
    </div>
  </section>
  <div>
    <app-popular-workouts [workouts]="topWorkouts"></app-popular-workouts>
    <app-rewards [rewards]="rewardCards"></app-rewards>
  </div>
</div>

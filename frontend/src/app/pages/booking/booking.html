<div class="p-8">
  <h1 class="text-2xl font-bold mb-4">All Gym Classes</h1>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let cls of classes" class="border p-4 rounded shadow hover:shadow-lg transition">
      <h2 class="font-semibold text-lg">{{ cls.name }}</h2>
      <p class="text-gray-700">{{ cls.description }}</p>
      <p class="mt-2 font-medium">Capacity: {{ cls.capacity }}</p>
      <button class="mt-2 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
        Book
      </button>
    </div>
  </div>
</div>

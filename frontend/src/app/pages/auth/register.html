<div class="min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full p-8 rounded-full-xl">
    <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

    <form (ngSubmit)="register()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full border rounded-full px-3 py-2 focus:outline-none focus:ring focus:ring-green-300"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full border rounded-full px-3 py-2 focus:outline-none focus:ring focus:ring-green-300"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Confirm Password</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          class="w-full border rounded-full px-3 py-2 focus:outline-none focus:ring focus:ring-green-300"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-green-800 text-white py-2 rounded-full hover:bg-green-700 transition cursor-pointer"
      >
        Register
      </button>
    </form>

    <p class="mt-4 text-center text-sm">
      Already have an account?
      <a href="/login" class="text-green-800 hover:underline">Login</a>
    </p>
  </div>
</div>

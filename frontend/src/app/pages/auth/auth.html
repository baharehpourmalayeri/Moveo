<div class="flex flex-col items-center justify-center h-full p-8 max-w-md mx-auto">
  <h1 class="text-3xl font-bold mb-4">{{ isLogin ? 'Login' : 'Register' }}</h1>

  <form class="w-full flex flex-col space-y-4">
    <input type="email" placeholder="Email" class="border p-2 rounded w-full">
    <input type="password" placeholder="Password" class="border p-2 rounded w-full">
    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
      {{ isLogin ? 'Login' : 'Register' }}
    </button>
  </form>

  <button (click)="toggleMode()" class="mt-4 text-blue-500 hover:underline">
    {{ isLogin ? 'Create an account' : 'Already have an account? Login' }}
  </button>
</div>

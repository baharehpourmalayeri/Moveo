@if (workout; as selectedWorkout) {
  <div class="flex justify-center mt-20">
    <div class="w-full max-w-4xl p-6 bg-white rounded-lg shadow">
      <img
        [src]="selectedWorkout.image"
        [alt]="selectedWorkout.title"
        class="w-full h-64 object-cover rounded-lg mb-4"
      />
      <div class="flex justify-between items-start mb-4">
        <div class="flex-col">
          <h1 class="text-3xl font-bold mb-2">{{ selectedWorkout.title }}</h1>
          <p class="text-gray-700 mb-4">{{ selectedWorkout?.longDescription }}</p>
        </div>
        <div class="flex flex-col justify-between items-end">
          <app-favorite-toggle
            [id]="workout.title"
            (favoriteChange)="onFavoriteChange($event)"
          ></app-favorite-toggle>
        </div>
      </div>
      <div class="flex justify-end mt-4">
        <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Book Now</button>
      </div>
    </div>
  </div>
}

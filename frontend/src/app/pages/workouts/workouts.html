<div class="max-w-6xl mx-auto px-6 py-12">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold mb-8">All Workouts</h1>
    <input
      type="text"
      placeholder="Search workouts..."
      [(ngModel)]="searchTerm"
      class="mb-6 w-full md:w-1/3 p-2 border rounded"
    />
  </div>

  <app-workout-list [workouts]="filteredWorkouts()"></app-workout-list>
</div>

<div class="flex items-center space-x-4">
  @for (link of links; track link.path) {
    <a
      [routerLink]="link.path"
      class="flex items-center justify-center text-sm px-4 py-2 w-20 h-10 rounded-full duration-200 cursor-pointer"
      [ngClass]="darkMode ? 'text-[#b3b3b3]' : 'text-black'"
    >
      {{ link.label }}
    </a>
  }
</div>
